{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💬 ChatApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- ✅ External stylesheet -->
  <link rel="stylesheet" href="{% static 'chatapp/css/style.css' %}">
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">💬</div>
    <div class="header-info">
      <h1>ChatApp</h1>
      <p><span class="status-dot"></span>FastAPI + Django • Always online</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">☕</div>
      <h2>Welcome to ChatApp</h2>
      <p>Send any message and the FastAPI backend will process it and reply. Try one of these:</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="useSuggestion(this)">👋 Say hello</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">😂 Tell me a joke</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">🕐 What time is it?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">📅 What's today's date?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">🤖 What are you?</button>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar" style="position:relative;">
    <!-- Emoji Picker -->
    <div class="emoji-picker" id="emojiPicker">
      <div class="emoji-category">Smileys</div>
      <div class="emoji-grid">
        <span class="emoji-item" onclick="insertEmoji('😀')">😀</span>
        <span class="emoji-item" onclick="insertEmoji('😂')">😂</span>
        <span class="emoji-item" onclick="insertEmoji('😍')">😍</span>
        <span class="emoji-item" onclick="insertEmoji('🥰')">🥰</span>
        <span class="emoji-item" onclick="insertEmoji('😊')">😊</span>
        <span class="emoji-item" onclick="insertEmoji('🤔')">🤔</span>
        <span class="emoji-item" onclick="insertEmoji('😎')">😎</span>
        <span class="emoji-item" onclick="insertEmoji('😢')">😢</span>
        <span class="emoji-item" onclick="insertEmoji('😡')">😡</span>
        <span class="emoji-item" onclick="insertEmoji('🤯')">🤯</span>
        <span class="emoji-item" onclick="insertEmoji('🥳')">🥳</span>
        <span class="emoji-item" onclick="insertEmoji('😴')">😴</span>
      </div>
      <div class="emoji-category">Gestures</div>
      <div class="emoji-grid">
        <span class="emoji-item" onclick="insertEmoji('👋')">👋</span>
        <span class="emoji-item" onclick="insertEmoji('👍')">👍</span>
        <span class="emoji-item" onclick="insertEmoji('👎')">👎</span>
        <span class="emoji-item" onclick="insertEmoji('❤️')">❤️</span>
        <span class="emoji-item" onclick="insertEmoji('🙏')">🙏</span>
        <span class="emoji-item" onclick="insertEmoji('👏')">👏</span>
        <span class="emoji-item" onclick="insertEmoji('🤝')">🤝</span>
        <span class="emoji-item" onclick="insertEmoji('✌️')">✌️</span>
      </div>
      <div class="emoji-category">Objects & Fun</div>
      <div class="emoji-grid">
        <span class="emoji-item" onclick="insertEmoji('🔥')">🔥</span>
        <span class="emoji-item" onclick="insertEmoji('✨')">✨</span>
        <span class="emoji-item" onclick="insertEmoji('🎉')">🎉</span>
        <span class="emoji-item" onclick="insertEmoji('💡')">💡</span>
        <span class="emoji-item" onclick="insertEmoji('🚀')">🚀</span>
        <span class="emoji-item" onclick="insertEmoji('🎯')">🎯</span>
        <span class="emoji-item" onclick="insertEmoji('⭐')">⭐</span>
        <span class="emoji-item" onclick="insertEmoji('💬')">💬</span>
        <span class="emoji-item" onclick="insertEmoji('☕')">☕</span>
        <span class="emoji-item" onclick="insertEmoji('🍕')">🍕</span>
        <span class="emoji-item" onclick="insertEmoji('🐍')">🐍</span>
        <span class="emoji-item" onclick="insertEmoji('🤖')">🤖</span>
      </div>
    </div>

    <div class="input-wrap">
      <button class="emoji-btn" id="emojiToggle" title="Emoji picker" onclick="toggleEmojiPicker()">😊</button>
      <textarea
        id="msgInput"
        placeholder="Type a message…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const welcomeEl  = document.getElementById('welcome');

  // ── Input handling ────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim();
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  }

  function useSuggestion(btn) {
    const text = btn.textContent.replace(/^[^\s]+\s/, '').trim();
    inputEl.value = text;
    sendBtn.disabled = false;
    inputEl.focus();
    autoResize(inputEl);
  }

  // ── Emoji Picker ──────────────────────────────────────────
  function toggleEmojiPicker() {
    document.getElementById('emojiPicker').classList.toggle('open');
  }

  function insertEmoji(emoji) {
    const start = inputEl.selectionStart;
    const end   = inputEl.selectionEnd;
    const val   = inputEl.value;
    inputEl.value = val.slice(0, start) + emoji + val.slice(end);
    inputEl.selectionStart = inputEl.selectionEnd = start + emoji.length;
    inputEl.focus();
    sendBtn.disabled = !inputEl.value.trim();
    autoResize(inputEl);
  }

  document.addEventListener('click', (e) => {
    const picker = document.getElementById('emojiPicker');
    const toggle = document.getElementById('emojiToggle');
    if (!picker.contains(e.target) && e.target !== toggle) {
      picker.classList.remove('open');
    }
  });

  // ── Send Message ──────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Hide welcome screen
    if (welcomeEl) welcomeEl.remove();

    // Append user bubble
    appendBubble('user', text);

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    inputEl.focus();

    // Show typing indicator
    const typingId = showTyping();

    try {
      const res = await fetch('/api/send/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Server error' }));
        appendBubble('bot', `⚠️ Error: ${err.error || 'Something went wrong'}`);
        return;
      }

      const data = await res.json();
      appendBubble('bot', data.reply);

    } catch (err) {
      removeTyping(typingId);
      appendBubble('bot', '⚠️ Could not reach the server. Is FastAPI running on port 8001?');
      showToast('Connection error – check terminal');
    }
  }

  // ── Build bubble ──────────────────────────────────────────
  function appendBubble(who, text) {
    const row = document.createElement('div');
    row.className = `msg-row ${who}`;

    const avatarEl = document.createElement('div');
    avatarEl.className = `avatar ${who}`;
    avatarEl.textContent = who === 'user' ? '🙂' : '🤖';

    const colEl = document.createElement('div');
    colEl.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${who}`;

    // Render **bold** markers
    bubble.innerHTML = renderText(text);

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = formatTime(new Date());

    colEl.appendChild(bubble);
    colEl.appendChild(ts);
    row.appendChild(avatarEl);
    row.appendChild(colEl);

    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function renderText(text) {
    // Escape HTML first
    const escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    // Bold: **text**
    return escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  // ── Typing indicator ──────────────────────────────────────
  let typingCounter = 0;

  function showTyping() {
    const id = ++typingCounter;
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = `typing-${id}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(`typing-${id}`);
    if (el) el.remove();
  }

  // ── Helpers ───────────────────────────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
